services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/html
    depends_on:
      php:
        condition: service_healthy
      nextjs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  php:
    image: serversideup/php:8.5-fpm
    expose:
      - "9000"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  postgres:
    image: postgres:18
    expose:
      - "5432"
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: app
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:8
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  nextjs:
    image: node:24-bookworm
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: >
      sh -c "
      if [ -f package.json ]; then
        npm install && npm run dev;
      else
        node -e \"require('http').createServer((req,res)=>{res.statusCode=200;res.setHeader('Content-Type','text/plain');res.end('nextjs placeholder')}).listen(3000,'0.0.0.0')\";
      fi
      "
    environment:
      NEXT_PUBLIC_API_URL: /api
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge
